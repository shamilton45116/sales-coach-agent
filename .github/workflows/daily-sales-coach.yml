name: Daily Sales Coach

on:
  # Schedule disabled 2026-07-13 — Sales Coach decommissioned. Replaced by Call Intelligence
  # (gong-call-review skill + gong-call-review-daily task; scores live in the Sales Hub).
  # This stops the daily #sales-coach Slack post. Re-enable by uncommenting the schedule.
  # schedule:
  #   - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-sales-coach:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run sales coach agent
        env:
          GONG_ACCESS_KEY:        ${{ secrets.GONG_ACCESS_KEY }}
          GONG_ACCESS_KEY_SECRET: ${{ secrets.GONG_ACCESS_KEY_SECRET }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN:        ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:          ${{ secrets.SLACK_CHANNEL }}
          SLACK_SUMMARY_CHANNEL:  ${{ secrets.SLACK_SUMMARY_CHANNEL }}
          GONG_TEAM_EMAILS:       ${{ secrets.GONG_TEAM_EMAILS }}
          # Sales Hub sync disabled 2026-07-10 — Call Intelligence (gong-call-review skill,
          # 1–5 SPICED) is now the sole producer of call_scores. Slack coaching continues.
          # To restore, re-add these two env vars (index.js skips sync when SALES_HUB_URL is unset).
          # SALES_HUB_URL:          ${{ secrets.SALES_HUB_URL }}
          # SALES_HUB_INTERNAL_API_KEY: ${{ secrets.SALES_HUB_INTERNAL_API_KEY }}
        run: node index.js

      - name: Commit score history
        run: |
          git config user.name  "Sales Coach Bot"
          git config user.email "sales-coach-bot@users.noreply.github.com"
          git add history/scores.json history/last-run.json
          git diff --staged --quiet || git commit -m "chore: update score history [skip ci]"
          git push
