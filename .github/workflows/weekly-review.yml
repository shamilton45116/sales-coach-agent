name: Weekly Rubric Review

on:
  schedule:
    - cron: '0 14 * * 5'   # Every Friday at 10am ET (14:00 UTC)
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write           # Needed to commit updated scorer.js

jobs:
  weekly-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run weekly review agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:     ${{ secrets.SLACK_CHANNEL }}
        run: node weekly-review.js

      - name: Commit updated scorer.js
        run: |
          git config user.name  "Sales Coach Bot"
          git config user.email "sales-coach-bot@users.noreply.github.com"
          git add scorer.js
          git diff --staged --quiet || git commit -m "chore: weekly rubric update [skip ci]"
          git push
